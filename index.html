<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-font-smoothing:antialiased}
:root{
  --bg:#0D0C10;--surface:#161520;--surface2:#1E1C28;--border:#2A2740;
  --gold:#C9993A;--gold-dim:rgba(201,153,58,0.12);--gold-rim:rgba(201,153,58,0.25);
  --cream:#F2EAD8;--muted:rgba(242,234,216,0.45);--dim:rgba(242,234,216,0.2);
  --green:#2DBB74;--green-dim:rgba(45,187,116,0.12);--green-rim:rgba(45,187,116,0.3);
  --amber:#F59E0B;--amber-dim:rgba(245,158,11,0.12);--amber-rim:rgba(245,158,11,0.3);
  --red:#EF4444;--red-dim:rgba(239,68,68,0.12);--red-rim:rgba(239,68,68,0.3);
  --blue:#3B82F6;--blue-dim:rgba(59,130,246,0.12);--blue-rim:rgba(59,130,246,0.3);
  --sans:'Figtree',sans-serif;--mono:'DM Mono',monospace;
  --ease:cubic-bezier(0.22,1,0.36,1);
}
body{background:var(--bg);color:var(--cream);font-family:var(--sans);min-height:100vh;line-height:1.5}

/* ── LOGIN GATE ── */
#loginGate{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);display:flex;align-items:center;justify-content:center;
}
.login-box{
  background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:2.5rem 2rem;width:100%;max-width:360px;text-align:center;
}
.login-logo{font-size:2.5rem;margin-bottom:0.8rem}
.login-title{font-size:1.3rem;font-weight:700;color:var(--cream);margin-bottom:0.3rem}
.login-sub{font-size:0.8rem;color:var(--muted);margin-bottom:2rem}
.login-input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:0.85rem 1rem;color:var(--cream);font-family:var(--sans);
  font-size:0.9rem;outline:none;margin-bottom:0.8rem;text-align:center;
  letter-spacing:0.1em;
}
.login-input:focus{border-color:var(--gold-rim)}
.login-btn{
  width:100%;background:var(--gold);color:#08070A;border:none;border-radius:10px;
  padding:0.9rem;font-family:var(--sans);font-size:0.95rem;font-weight:700;
  cursor:pointer;transition:background 0.2s;
}
.login-btn:hover{background:#E5B355}
.login-err{font-size:0.78rem;color:var(--red);margin-top:0.5rem;display:none}

/* ── APP ── */
#app{display:none;min-height:100vh}

/* ── TOPBAR ── */
.topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.topbar-brand{display:flex;align-items:center;gap:0.6rem}
.topbar-logo{width:36px;height:36px;background:var(--gold-dim);border:1px solid var(--gold-rim);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.topbar-name{font-size:1rem;font-weight:700;color:var(--cream)}
.topbar-name span{color:var(--gold)}
.topbar-right{display:flex;align-items:center;gap:1rem}
.topbar-time{font-family:var(--mono);font-size:0.75rem;color:var(--muted)}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:0.4rem 0.8rem;font-size:0.78rem;cursor:pointer;font-family:var(--sans);transition:color 0.2s,border-color 0.2s}
.logout-btn:hover{color:var(--cream);border-color:var(--cream)}

/* ── STATS BAR ── */
.stats-bar{
  display:grid;grid-template-columns:repeat(4,1fr);gap:1px;
  background:var(--border);border-bottom:1px solid var(--border);
}
.stat-box{
  background:var(--surface);padding:1rem 1.5rem;text-align:center;
}
.stat-box .sv{font-size:1.8rem;font-weight:700;font-family:var(--mono);line-height:1;margin-bottom:0.2rem}
.stat-box .sl{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}
.sv.green{color:var(--green)}
.sv.amber{color:var(--amber)}
.sv.red{color:var(--red)}
.sv.blue{color:var(--blue)}

/* ── MAIN LAYOUT ── */
.main{padding:1.5rem;max-width:1400px;margin:0 auto}

/* ── TOOLBAR ── */
.toolbar{
  display:flex;align-items:center;gap:0.75rem;margin-bottom:1.5rem;flex-wrap:wrap;
}
.toolbar-title{font-size:1.1rem;font-weight:700;color:var(--cream);flex:1}
.search-box{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:0.6rem 1rem;color:var(--cream);font-family:var(--sans);font-size:0.85rem;
  outline:none;width:220px;transition:border-color 0.2s;
}
.search-box::placeholder{color:var(--dim)}
.search-box:focus{border-color:var(--gold-rim)}
.filter-btn{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:0.6rem 0.9rem;color:var(--muted);font-size:0.8rem;cursor:pointer;
  font-family:var(--sans);transition:all 0.2s;white-space:nowrap;
}
.filter-btn:hover,.filter-btn.active{background:var(--gold-dim);border-color:var(--gold-rim);color:var(--gold)}
.add-btn{
  background:var(--gold);color:#08070A;border:none;border-radius:8px;
  padding:0.6rem 1.1rem;font-size:0.85rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:0.4rem;font-family:var(--sans);
  transition:background 0.2s;white-space:nowrap;
}
.add-btn:hover{background:#E5B355}

/* ── CITY TABS ── */
.city-tabs{display:flex;gap:0.5rem;margin-bottom:1.2rem;flex-wrap:wrap}
.city-tab{
  padding:0.45rem 1rem;border-radius:20px;font-size:0.8rem;font-weight:600;
  cursor:pointer;transition:all 0.2s;border:1px solid var(--border);
  background:var(--surface);color:var(--muted);
}
.city-tab:hover{border-color:var(--gold-rim);color:var(--cream)}
.city-tab.active{background:var(--gold-dim);border-color:var(--gold-rim);color:var(--gold)}

/* ── DRIVER GRID ── */
.driver-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}

/* ── DRIVER CARD ── */
.driver-card{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:1.2rem;transition:border-color 0.2s,transform 0.2s;
  position:relative;overflow:hidden;
}
.driver-card:hover{border-color:rgba(201,153,58,0.2);transform:translateY(-2px)}
.driver-card.available{border-left:3px solid var(--green)}
.driver-card.on-trip{border-left:3px solid var(--amber)}
.driver-card.offline{border-left:3px solid var(--red);opacity:0.7}

.dc-top{display:flex;align-items:flex-start;gap:0.9rem;margin-bottom:1rem}
.dc-avatar{
  width:46px;height:46px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;font-weight:700;color:#08070A;
}
.dc-avatar.av{background:linear-gradient(135deg,var(--green),#1a8a52)}
.dc-avatar.ot{background:linear-gradient(135deg,var(--amber),#b57a00)}
.dc-avatar.of{background:var(--surface2);color:var(--dim)}
.dc-info{flex:1;min-width:0}
.dc-name{font-size:0.95rem;font-weight:700;color:var(--cream);margin-bottom:0.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dc-meta{font-size:0.75rem;color:var(--muted);display:flex;gap:0.5rem;flex-wrap:wrap}
.dc-rating{font-family:var(--mono);font-size:0.7rem;color:var(--gold)}
.dc-status{
  font-family:var(--mono);font-size:0.62rem;font-weight:600;
  letter-spacing:0.07em;text-transform:uppercase;
  padding:0.15rem 0.5rem;border-radius:5px;
  align-self:flex-start;flex-shrink:0;
}
.dc-status.available{background:var(--green-dim);color:var(--green);border:1px solid var(--green-rim)}
.dc-status.on-trip{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-rim)}
.dc-status.offline{background:var(--red-dim);color:var(--red);border:1px solid var(--red-rim)}

.dc-details{display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap}
.dc-chip{font-size:0.72rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:0.18rem 0.5rem}

/* Status toggle buttons */
.dc-actions{display:flex;gap:0.5rem}
.dc-btn{
  flex:1;padding:0.5rem;border-radius:8px;font-size:0.75rem;font-weight:600;
  cursor:pointer;border:1px solid;font-family:var(--sans);transition:all 0.15s;
}
.dc-btn-avail{background:var(--green-dim);color:var(--green);border-color:var(--green-rim)}
.dc-btn-avail:hover{background:var(--green);color:#fff}
.dc-btn-trip{background:var(--amber-dim);color:var(--amber);border-color:var(--amber-rim)}
.dc-btn-trip:hover{background:var(--amber);color:#fff}
.dc-btn-off{background:var(--red-dim);color:var(--red);border-color:var(--red-rim)}
.dc-btn-off:hover{background:var(--red);color:#fff}
.dc-btn.active-state{opacity:0.4;cursor:default;pointer-events:none}
.dc-btn-del{
  width:34px;flex:none;padding:0.5rem;border-radius:8px;
  background:transparent;color:var(--dim);border:1px solid var(--border);
  cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.dc-btn-del:hover{background:var(--red-dim);color:var(--red);border-color:var(--red-rim)}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty-state .ei{font-size:3rem;margin-bottom:1rem;display:block}

/* ── MODAL ── */
.modal-backdrop{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;padding:1rem;display:none}
.modal-backdrop.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:1.8rem;width:100%;max-width:420px}
.modal-title{font-size:1.1rem;font-weight:700;color:var(--cream);margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem}
.modal-close:hover{color:var(--cream)}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:0.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.3rem;font-family:var(--mono)}
.form-input,.form-select{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:9px;padding:0.7rem 0.9rem;color:var(--cream);
  font-family:var(--sans);font-size:0.88rem;outline:none;transition:border-color 0.2s;
  appearance:none;
}
.form-input:focus,.form-select:focus{border-color:var(--gold-rim)}
.form-input::placeholder{color:var(--dim)}
.form-select option{background:var(--surface2);color:var(--cream)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
.modal-actions{display:flex;gap:0.6rem;margin-top:1.5rem}
.modal-save{flex:1;background:var(--gold);color:#08070A;border:none;border-radius:9px;padding:0.8rem;font-weight:700;font-size:0.9rem;cursor:pointer;font-family:var(--sans);transition:background 0.2s}
.modal-save:hover{background:#E5B355}
.modal-cancel{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:9px;padding:0.8rem 1.2rem;font-size:0.85rem;cursor:pointer;font-family:var(--sans);transition:all 0.2s}
.modal-cancel:hover{color:var(--cream);border-color:var(--cream)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:0.7rem 1.2rem;font-size:0.85rem;font-weight:500;color:var(--cream);
  z-index:9999;transition:transform 0.35s var(--ease);white-space:nowrap;
  box-shadow:0 8px 30px rgba(0,0,0,0.5);
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--green-rim);color:var(--green)}
.toast.error{border-color:var(--red-rim);color:var(--red)}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .stats-bar{grid-template-columns:1fr 1fr}
  .driver-grid{grid-template-columns:1fr}
  .main{padding:1rem}
  .topbar{padding:0.8rem 1rem}
  .search-box{width:100%}
  .toolbar{flex-direction:column;align-items:stretch}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ══ LOGIN GATE ══ -->
<div id="loginGate">
  <div class="login-box">
    <div class="login-logo">🚗</div>
    <div class="login-title">DriveBuddy <span style="color:var(--gold)">Admin</span></div>
    <div class="login-sub">Driver management panel · Enter your password</div>
    <input type="password" class="login-input" id="pwInput" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')checkLogin()">
    <button class="login-btn" onclick="checkLogin()">Sign In</button>
    <div class="login-err" id="loginErr">Incorrect password. Try again.</div>
  </div>
</div>

<!-- ══ MAIN APP ══ -->
<div id="app">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">🚗</div>
      <div class="topbar-name">Drive<span>Buddy</span> Admin</div>
    </div>
    <div class="topbar-right">
      <div class="topbar-time" id="liveTime"></div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-box"><div class="sv green" id="st-avail">–</div><div class="sl">Available</div></div>
    <div class="stat-box"><div class="sv amber" id="st-trip">–</div><div class="sl">On Trip</div></div>
    <div class="stat-box"><div class="sv red" id="st-off">–</div><div class="sl">Offline</div></div>
    <div class="stat-box"><div class="sv blue" id="st-total">–</div><div class="sl">Total Drivers</div></div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="toolbar">
      <div class="toolbar-title">Driver Roster</div>
      <input type="text" class="search-box" id="searchBox" placeholder="🔍  Search driver name…" oninput="applyFilters()">
      <button class="filter-btn active" id="filter-all" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" id="filter-available" onclick="setFilter('available',this)">Available</button>
      <button class="filter-btn" id="filter-on-trip" onclick="setFilter('on-trip',this)">On Trip</button>
      <button class="filter-btn" id="filter-offline" onclick="setFilter('offline',this)">Offline</button>
      <button class="add-btn" onclick="openAddModal()">+ Add Driver</button>
    </div>

    <div class="city-tabs" id="cityTabs">
      <div class="city-tab active" onclick="setCity('all',this)">All Cities</div>
      <div class="city-tab" onclick="setCity('Raipur',this)">Raipur</div>
      <div class="city-tab" onclick="setCity('Bhilai',this)">Bhilai</div>
      <div class="city-tab" onclick="setCity('Durg',this)">Durg</div>
      <div class="city-tab" onclick="setCity('Bilaspur',this)">Bilaspur</div>
    </div>

    <div class="driver-grid" id="driverGrid">
      <div style="color:var(--muted);font-size:0.9rem;padding:2rem">Loading drivers…</div>
    </div>
  </div>
</div>

<!-- ══ ADD/EDIT MODAL ══ -->
<div class="modal-backdrop" id="driverModal">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle">Add New Driver</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" class="form-input" id="m_name" placeholder="Ramesh Kumar">
      </div>
      <div class="form-group">
        <label>Mobile *</label>
        <input type="tel" class="form-input" id="m_phone" placeholder="9876543210" maxlength="10">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>City *</label>
        <select class="form-select" id="m_city">
          <option value="">Select city</option>
          <option value="Raipur">Raipur</option>
          <option value="Bhilai">Bhilai</option>
          <option value="Durg">Durg</option>
          <option value="Bilaspur">Bilaspur</option>
        </select>
      </div>
      <div class="form-group">
        <label>Experience (years)</label>
        <input type="number" class="form-input" id="m_exp" placeholder="6" min="1" max="40">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Rating (out of 5)</label>
        <input type="number" class="form-input" id="m_rating" placeholder="4.9" min="1" max="5" step="0.1">
      </div>
      <div class="form-group">
        <label>Initial Status</label>
        <select class="form-select" id="m_status">
          <option value="available">Available</option>
          <option value="offline">Offline</option>
          <option value="on-trip">On Trip</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Vehicle (optional)</label>
      <input type="text" class="form-input" id="m_vehicle" placeholder="Honda City, Swift…">
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-save" onclick="saveDriver()" id="saveBtn">Save Driver</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════
   AUTH — Change this password!
══════════════════════════════════════ */
const ADMIN_PASSWORD = 'drivebuddy2026'; // ← CHANGE THIS

function checkLogin(){
  const pw = document.getElementById('pwInput').value;
  if(pw === ADMIN_PASSWORD){
    sessionStorage.setItem('db_auth','1');
    document.getElementById('loginGate').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}
function logout(){sessionStorage.removeItem('db_auth');location.reload()}

// Auto-login if already authenticated in session
if(sessionStorage.getItem('db_auth')==='1'){
  document.getElementById('loginGate').style.display='none';
  document.getElementById('app').style.display='block';
}

/* ══════════════════════════════════════
   LIVE CLOCK
══════════════════════════════════════ */
function updateClock(){
  document.getElementById('liveTime').textContent =
    new Date().toLocaleString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true,
      day:'numeric',month:'short'});
}
setInterval(updateClock,1000);updateClock();

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let allDrivers = {};  // id → driver object
let currentFilter = 'all';
let currentCity   = 'all';
let editingId     = null;

/* ══════════════════════════════════════
   FIREBASE LISTENER — real-time updates
══════════════════════════════════════ */
function initApp(){
  db.ref('drivers').on('value', snap => {
    allDrivers = {};
    if(snap.exists()) snap.forEach(c => { allDrivers[c.key] = c.val() });
    updateStats();
    renderGrid();
  });
}

// Auto-init if already logged in on page load
if(sessionStorage.getItem('db_auth')==='1') initApp();

/* ══════════════════════════════════════
   STATS
══════════════════════════════════════ */
function updateStats(){
  const vals = Object.values(allDrivers);
  document.getElementById('st-avail').textContent = vals.filter(d=>d.status==='available').length;
  document.getElementById('st-trip').textContent  = vals.filter(d=>d.status==='on-trip').length;
  document.getElementById('st-off').textContent   = vals.filter(d=>d.status==='offline').length;
  document.getElementById('st-total').textContent = vals.length;
}

/* ══════════════════════════════════════
   FILTERS
══════════════════════════════════════ */
function setFilter(f,el){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}
function setCity(c,el){
  currentCity = c;
  document.querySelectorAll('.city-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}
function applyFilters(){renderGrid()}

/* ══════════════════════════════════════
   RENDER GRID
══════════════════════════════════════ */
function renderGrid(){
  const grid  = document.getElementById('driverGrid');
  const query = document.getElementById('searchBox').value.toLowerCase();

  let list = Object.entries(allDrivers).filter(([id, d]) => {
    const matchFilter = currentFilter==='all' || d.status===currentFilter;
    const matchCity   = currentCity==='all' || d.city===currentCity;
    const matchSearch = !query || d.name.toLowerCase().includes(query);
    return matchFilter && matchCity && matchSearch;
  });

  if(list.length === 0){
    grid.innerHTML = `<div class="empty-state"><span class="ei">🔍</span>No drivers match your filters.</div>`;
    return;
  }

  // Sort: available first, then on-trip, then offline
  const order = {available:0,'on-trip':1,offline:2};
  list.sort((a,b)=>(order[a[1].status]||3)-(order[b[1].status]||3));

  grid.innerHTML = list.map(([id, d]) => {
    const statusLabel = {available:'Available','on-trip':'On Trip',offline:'Offline'}[d.status] || 'Offline';
    const statusClass = d.status === 'on-trip' ? 'on-trip' : d.status;
    const initials    = (d.name||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    const avClass     = statusClass === 'available' ? 'av' : statusClass === 'on-trip' ? 'ot' : 'of';

    return `
    <div class="driver-card ${statusClass}" id="card-${id}">
      <div class="dc-top">
        <div class="dc-avatar ${avClass}">${initials}</div>
        <div class="dc-info">
          <div class="dc-name">${d.name || 'Unknown'}</div>
          <div class="dc-meta">
            <span>📍 ${d.city || '–'}</span>
            ${d.rating ? `<span class="dc-rating">★ ${d.rating}</span>` : ''}
          </div>
        </div>
        <div class="dc-status ${statusClass}">${statusLabel}</div>
      </div>
      <div class="dc-details">
        ${d.experience ? `<span class="dc-chip">🕐 ${d.experience} yrs</span>` : ''}
        ${d.phone      ? `<span class="dc-chip">📱 ${d.phone}</span>` : ''}
        ${d.vehicle    ? `<span class="dc-chip">🚗 ${d.vehicle}</span>` : ''}
      </div>
      <div class="dc-actions">
        <button class="dc-btn dc-btn-avail${d.status==='available'?' active-state':''}"
          onclick="setStatus('${id}','available')">✓ Available</button>
        <button class="dc-btn dc-btn-trip${d.status==='on-trip'?' active-state':''}"
          onclick="setStatus('${id}','on-trip')">🚗 On Trip</button>
        <button class="dc-btn dc-btn-off${d.status==='offline'?' active-state':''}"
          onclick="setStatus('${id}','offline')">⏸ Offline</button>
        <button class="dc-btn-del" onclick="editDriver('${id}')" title="Edit">✏️</button>
        <button class="dc-btn-del" onclick="deleteDriver('${id}','${(d.name||'').replace(/'/g,'')}')" title="Delete">🗑</button>
      </div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════
   STATUS CHANGE
══════════════════════════════════════ */
function setStatus(id, status){
  db.ref('drivers/' + id + '/status').set(status)
    .then(()=>showToast('✓ Status updated','success'))
    .catch(()=>showToast('Failed to update','error'));
}

/* ══════════════════════════════════════
   ADD / EDIT MODAL
══════════════════════════════════════ */
function openAddModal(){
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add New Driver';
  ['m_name','m_phone','m_city','m_exp','m_rating','m_vehicle','m_status'].forEach(id=>{
    const el = document.getElementById(id);
    if(el.tagName==='SELECT') el.value = id==='m_status' ? 'available' : '';
    else el.value = '';
  });
  document.getElementById('driverModal').classList.add('open');
  setTimeout(()=>document.getElementById('m_name').focus(),100);
}

function editDriver(id){
  const d = allDrivers[id];
  if(!d) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Driver';
  document.getElementById('m_name').value    = d.name || '';
  document.getElementById('m_phone').value   = d.phone || '';
  document.getElementById('m_city').value    = d.city || '';
  document.getElementById('m_exp').value     = d.experience || '';
  document.getElementById('m_rating').value  = d.rating || '';
  document.getElementById('m_vehicle').value = d.vehicle || '';
  document.getElementById('m_status').value  = d.status || 'available';
  document.getElementById('driverModal').classList.add('open');
}

function closeModal(){document.getElementById('driverModal').classList.remove('open')}

function saveDriver(){
  const name   = document.getElementById('m_name').value.trim();
  const phone  = document.getElementById('m_phone').value.trim();
  const city   = document.getElementById('m_city').value;
  const exp    = document.getElementById('m_exp').value;
  const rating = document.getElementById('m_rating').value;
  const vehicle= document.getElementById('m_vehicle').value.trim();
  const status = document.getElementById('m_status').value;

  if(!name || !city){ showToast('Name and city are required','error'); return; }

  const data = {
    name, city, status,
    phone:    phone   || null,
    experience: exp   ? parseInt(exp) : null,
    rating:   rating  ? parseFloat(rating) : 4.9,
    vehicle:  vehicle || null,
    updatedAt: Date.now()
  };

  const ref = editingId
    ? db.ref('drivers/' + editingId)
    : db.ref('drivers').push();

  ref.update ? ref.update(data) : ref.set(data);
  showToast(editingId ? '✓ Driver updated' : '✓ Driver added','success');
  closeModal();
}

/* ══════════════════════════════════════
   DELETE
══════════════════════════════════════ */
function deleteDriver(id, name){
  if(!confirm(`Remove ${name} from the roster? This cannot be undone.`)) return;
  db.ref('drivers/' + id).remove()
    .then(()=>showToast('Driver removed','success'))
    .catch(()=>showToast('Failed to remove','error'));
}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
let toastTimer;
function showToast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2500);
}

/* ══════════════════════════════════════
   KEYBOARD SHORTCUTS
══════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') closeModal();
  if(e.key === '/' && document.activeElement.tagName !== 'INPUT'){
    e.preventDefault();document.getElementById('searchBox').focus();
  }
});
